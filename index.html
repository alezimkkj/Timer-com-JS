<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Simples</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Adicionando Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark">
    <main>
        <div class="themesOptions">
            <button id="darkButton" class="active">
                <i class="fa-solid fa-moon"></i>
            </button>

            <button id="whiteButton">
                <i class="fa-solid fa-sun"></i>
            </button>
         </div>

        <div class="timerArea">
            <div id="timer">00:00</div>
        </div>

        <div class="timerOptions">
            <button id="resetButton">Reiniciar</button>
            <button id="startButton">Iniciar</button>
            <button id="pauseButton">Pausar</button>
        </div>
    </main>

    <script src="assets/scripts/themes.js"></script>
    <script src="assets/scripts/timer.js"></script>
</body>
</html>
